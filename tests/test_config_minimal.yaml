# Minimal test configuration for DexScreener scanner
# This configuration sets the lowest possible thresholds for testing

# Logging configuration
log_level: "DEBUG"
log_http_requests: true
log_http_responses: true
log_raw_responses: true
log_filtered_tokens: true

# Network configuration
networks:
  enabled:
    - ethereum
    - bsc
    - polygon
  
  # Network-specific configurations
  ethereum:
    rpc_url: "https://eth.llamarpc.com"
    chain_id: 1
    native_currency: "ETH"
    wrapped_native: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
    explorer_url: "https://etherscan.io"
    
  bsc:
    rpc_url: "https://bsc-dataseed.binance.org/"
    chain_id: 56
    native_currency: "BNB"
    wrapped_native: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c"
    explorer_url: "https://bscscan.com"
    
  polygon:
    rpc_url: "https://polygon-rpc.com/"
    chain_id: 137
    native_currency: "MATIC"
    wrapped_native: "0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270"
    explorer_url: "https://polygonscan.com"

# Network overrides for scanner
network_overrides:
  ethereum:
    rpc_url: "https://eth.llamarpc.com"
    explorer_url: "https://etherscan.io"
  bsc:
    rpc_url: "https://bsc-dataseed.binance.org/"
    explorer_url: "https://bscscan.com"
  polygon:
    rpc_url: "https://polygon-rpc.com/"
    explorer_url: "https://polygonscan.com"
  
# Scanner configuration
scanners:
  enabled: true
  scan_interval: 60  # seconds
  max_concurrent_scans: 3
  
  # Global scanner settings
  config:
    # Use v2 API for more data points
    api_version: 'v2'
    mode: 'standard'
    
    # Rate limiting
    rate_limit:
      max_concurrent: 3
      min_interval: 0.5  # seconds
    
    # Extremely permissive filters to find as many tokens as possible
    filters:
      min_liquidity: 0.000001  # $0.000001 minimum liquidity (practically anything)
      min_volume: 0.0         # No minimum volume requirement
      min_age_hours: 0         # Include brand new tokens
    
    # Ultra mode settings (not used in standard mode)
    ultra_mode:
      min_liquidity: 10        # $10 minimum for ultra mode
      min_volume: 10           # $10 minimum for ultra mode
      max_age: 86400           # 24 hours max age for ultra mode
  
  # DexScreener Scanner
  dex_screener:
    enabled: true
    
    # Network-specific overrides
    networks:
      ethereum:
        enabled: true
        factory_address: "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"  # Uniswap V2
        filters:
          min_liquidity: 0.01
          min_volume: 0.01
      bsc:
        enabled: true
        factory_address: "0xcA143Ce32Fe78f1f7019d7d551a6402fC5350c73"  # PancakeSwap
        filters:
          min_liquidity: 0.01
          min_volume: 0.01
      polygon:
        enabled: true
        factory_address: "0x5757371414417b8C6CAad45bAeF941aBc7d3Ab32"  # QuickSwap
        filters:
          min_liquidity: 0.01
          min_volume: 0.01

# RPC URLs with environment variable fallbacks
rpc_urls:
  ethereum: ${ETHEREUM_RPC_URL:-https://eth.llamarpc.com}
  bsc: ${BSC_RPC_URL:-https://bsc-dataseed.binance.org/}
  polygon: ${POLYGON_RPC_URL:-https://polygon-rpc.com/}

# Test mode settings
test_mode: true
test_networks: ['ethereum', 'bsc', 'polygon']
