name: CI - Pytest & Fingerprints

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Clean system (optional pre-test cleanup)
      - name: Clean workspace
        run: |
          rm -rf ~/.cache/verdant
          rm -rf .pytest_cache
          rm -rf temp_logs || true

      # Run pytest with strict flags
      - name: Run pytest
        run: |
          pytest --maxfail=1 --disable-warnings -rs
        continue-on-error: false

      # Verify fingerprints
      - name: Verify fingerprints
        run: |
          python scripts/verify_fingerprints.py
        continue-on-error: false

      # Optional: upload test logs
      - name: Upload logs
        uses: actions/upload-artifact@v3
        with:
          name: pytest-logs
          path: test-reports/
