  risk_management:
    max_position_size: 0.05
    max_total_exposure: 0.3
    stop_loss_global: 0.1
    max_drawdown: 0.15
    risk_per_trade: 0.01
    max_leverage: 1.0
    portfolio_heat_limit: 0.6
    max_concurrent_positions: 3

  position_sizing:
    method: "fixed_risk"
    base_size: 0.01
    max_size: 0.05
    risk_per_trade: 0.01
