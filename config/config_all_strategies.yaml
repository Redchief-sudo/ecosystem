# Complete Strategy Configuration for All 8 Strategies
# ==================================================

strategies:
  # Enable all 8 strategies
  enabled:
    - momentum
    - mean_reversion
    - breakout
    - volatility_breakout
    - aggressive
    - risk_caps
    - smart_money
    - professional_elite
  
  # Global strategy settings
  confidence_threshold: 0.7
  max_positions: 5
  risk_management:
    max_total_exposure: 0.5
    max_position_size: 0.1
    stop_loss_global: 0.1

  # ===== STRATEGY CLASS-SPECIFIC CONFIGURATIONS =====
  
  # 1. EliteMomentumStrategy
  EliteMomentumStrategy:
    enabled: true
    lookback: 60
    threshold: 0.7
    min_volume_24h: 100000
    min_liquidity: 50000
    min_market_cap: 1000000
    min_price_change: 0.02
    max_price_change: 0.15
    rsi_overbought: 70
    rsi_oversold: 30
    require_momentum_alignment: true
    min_confidence: 0.50
    base_position_size: 0.002
    max_position_size: 0.01
    multi_timeframe: true
    volume_confirmation: true

  # 2. MeanReversionStrategy
  MeanReversionStrategy:
    enabled: true
    lookback: 120
    zscore: 2.0
    min_volume_24h: 100000
    min_liquidity: 50000
    min_market_cap: 1000000
    std_dev_threshold: 2.0
    extreme_threshold: 3.0
    min_confidence: 0.35
    max_confidence: 0.90
    stop_loss: 0.05
    take_profit: 0.10
    risk_reward_ratio: 2.0
    max_half_life: 50
    bollinger_periods: 20
    bollinger_std: 2.0
    volatility_lookback: 14
    adaptive_thresholds: true

  # 3. EliteBreakoutStrategy
  EliteBreakoutStrategy:
    enabled: false  # Enable when ready
    min_volume_24h: 200000
    min_liquidity: 100000
    breakout_threshold: 0.02
    confirmation_periods: 3
    false_breakout_protection: true
    min_confidence: 0.6
    max_position_size: 0.05
    volume_confirmation_multiplier: 1.5
    price_confirmation_threshold: 0.01

  # 4. VolatilityBreakoutStrategy
  VolatilityBreakoutStrategy:
    enabled: false  # Enable when ready
    min_volume_24h: 150000
    min_liquidity: 75000
    squeeze_threshold: 0.01
    expansion_factor: 2.0
    min_confidence: 0.65
    max_position_size: 0.04
    bollinger_period: 20
    bollinger_std: 2.0
    volume_spike_threshold: 2.0

  # 5. EliteAggressiveStrategy
  EliteAggressiveStrategy:
    enabled: false  # Enable when ready
    max_position_size: 0.05
    max_drawdown: 0.15
    leverage: 2.0
    min_confidence: 0.8
    high_volatility_threshold: 0.3
    risk_multiplier: 1.5
    profit_target_multiplier: 2.0
    stop_loss_tight: 0.03

  # 6. RiskCapsStrategy
  RiskCapsStrategy:
    enabled: false  # Enable when ready
    max_position_size: 0.05
    max_drawdown: 0.1
    var_limit: 0.02
    correlation_limit: 0.7
    portfolio_heat_limit: 0.8
    max_leverage: 3.0
    var_confidence: 0.95
    rebalance_threshold: 0.1

  # 7. ProfessionalEliteStrategy
  ProfessionalEliteStrategy:
    enabled: false  # Enable when ready
    kelly_criterion: true
    max_leverage: 3.0
    risk_free_rate: 0.02
    min_sharpe_ratio: 1.5
    max_positions: 10
    position_sizing_method: "kelly"
    risk_adjusted_returns: true
    portfolio_optimization: true

  # 8. SmartMoneyUltraStrategy
  SmartMoneyUltraStrategy:
    enabled: false  # Enable when ready
    min_wallet_value: 100000
    min_transaction_count: 10
    whale_threshold: 1000000
    follow_ratio: 0.3
    min_confidence: 0.7
    lookback_window: 30
    wallet_analysis_depth: 100
    transaction_size_threshold: 50000

  # ===== STRATEGY NAME-SPECIFIC CONFIGURATIONS =====
  # (For direct name lookup from strategy classes)
  
  momentum:
    enabled: true
    lookback: 60
    threshold: 0.7
    min_volume_24h: 100000
    min_liquidity: 50000
    min_market_cap: 1000000
    min_price_change: 0.02
    max_price_change: 0.15
    rsi_overbought: 70
    rsi_oversold: 30
    require_momentum_alignment: true
    min_confidence: 0.50
    base_position_size: 0.002
    max_position_size: 0.01
    lookback_periods: [14, 30, 60]
    volume_weight: 0.3
    price_weight: 0.4
    rsi_weight: 0.3

  mean_reversion:
    enabled: true
    lookback: 120
    zscore: 2.0
    min_volume_24h: 100000
    min_liquidity: 50000
    min_market_cap: 1000000
    std_dev_threshold: 2.0
    extreme_threshold: 3.0
    min_confidence: 0.35
    max_confidence: 0.90
    stop_loss: 0.05
    take_profit: 0.10
    risk_reward_ratio: 2.0
    max_half_life: 50
    min_hurst: 0.3
    max_hurst: 0.5
    bollinger_periods: 20
    bollinger_std: 2.0
    volatility_lookback: 14
    regime_sensitivity: 0.7
    volume_surge_threshold: 1.5
    max_position_size: 0.08
    min_position_size: 0.01
    zscore_decay: 0.9
    enabled_chains:
      - ethereum
      - bsc
      - polygon
      - arbitrum
      - optimism
      - avalanche
      - fantom

  breakout:
    enabled: false
    min_volume_24h: 200000
    min_liquidity: 100000
    breakout_threshold: 0.02
    confirmation_periods: 3
    false_breakout_protection: true
    min_confidence: 0.6
    max_position_size: 0.05
    volume_confirmation_multiplier: 1.5
    price_confirmation_threshold: 0.01
    multi_timeframe: true
    volume_spike_required: true

  volatility_breakout:
    enabled: false
    min_volume_24h: 150000
    min_liquidity: 75000
    squeeze_threshold: 0.01
    expansion_factor: 2.0
    min_confidence: 0.65
    max_position_size: 0.04
    bollinger_period: 20
    bollinger_std: 2.0
    volume_spike_threshold: 2.0
    squeeze_duration_min: 20
    expansion_confirmation: true

  aggressive:
    enabled: false
    max_position_size: 0.05
    max_drawdown: 0.15
    leverage: 2.0
    min_confidence: 0.8
    high_volatility_threshold: 0.3
    risk_multiplier: 1.5
    profit_target_multiplier: 2.0
    stop_loss_tight: 0.03
    momentum_threshold: 0.05
    volume_requirement: 50000

  risk_caps:
    enabled: false
    max_position_size: 0.05
    max_drawdown: 0.1
    var_limit: 0.02
    correlation_limit: 0.7
    portfolio_heat_limit: 0.8
    max_leverage: 3.0
    var_confidence: 0.95
    rebalance_threshold: 0.1
    position_concentration_limit: 0.2
    sector_exposure_limit: 0.3

  smart_money:
    enabled: false
    min_wallet_value: 100000
    min_transaction_count: 10
    whale_threshold: 1000000
    follow_ratio: 0.3
    min_confidence: 0.7
    lookback_window: 30
    wallet_analysis_depth: 100
    transaction_size_threshold: 50000
    profit_taking_ratio: 2.0
    stop_loss_ratio: 0.5

  professional_elite:
    enabled: false
    kelly_criterion: true
    max_leverage: 3.0
    risk_free_rate: 0.02
    min_sharpe_ratio: 1.5
    max_positions: 10
    position_sizing_method: "kelly"
    risk_adjusted_returns: true
    portfolio_optimization: true
    rebalance_frequency: "daily"
    max_sector_exposure: 0.2
