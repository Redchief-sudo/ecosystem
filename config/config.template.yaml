mode: "paper"  # or "live"

# API Keys (shared between modes)
api_keys:
  etherscan: ${ETHERSCAN_API_KEY}
  bscscan: ${BSCSCAN_API_KEY}
  polygonscan: ${POLYGONSCAN_API_KEY}
  # Add other API keys here

# Trading Configuration
trading:
  # General settings
  min_profit_threshold: 0.01  # 1% minimum profit
  max_slippage: 0.005  # 0.5%
  max_gas_price_gwei: 50  # Maximum gas price in Gwei
  
  # Risk management
  max_position_size_eth: 5  # Max position size in ETH
  max_risk_per_trade: 0.02  # 2% of portfolio
  max_open_trades: 5  # Maximum number of concurrent trades
  
  # Flash loan settings
  flash_loan_fee: 0.0009  # 0.09% fee for flash loans
  max_flash_loan_utilization: 0.8  # 80% of available liquidity

# Strategy Configuration
strategies:
  flash_loan_arbitrage:
    enabled: true
    min_profit_eth: 0.1  # Minimum profit in ETH to execute
    max_gas_price_gwei: 100  # Max gas price for this strategy
    max_position_size_eth: 10  # Override global setting
  
  sandwich_detection:
    enabled: true
    min_profit_eth: 0.05
    max_sandwich_size_eth: 10  # Maximum size to consider for sandwich detection

# Monitoring & Alerts
alerts:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}  # Set in .env
    chat_id: ${TELEGRAM_CHAT_ID}  # Set in .env
  
  # Health checks
  health_check_interval: 300  # 5 minutes
  max_retry_attempts: 3
  
# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/trading_bot.log"
  max_size_mb: 100
  backup_count: 3

# API Keys (for reference, should be in .env)
api_keys:
  etherscan: ${ETHERSCAN_API_KEY}
  bscscan: ${BSCSCAN_API_KEY}
  
# Performance Settings
performance:
  max_workers: 4  # Number of worker threads
  request_timeout: 30  # Seconds
  cache_ttl: 300  # 5 minutes

# Development Settings
dev:
  test_mode: false  # Set to true to disable actual trades
  log_all_transactions: true
  log_all_errors: true
