# API Configuration (Shared between paper and live modes)
# These keys are used in both modes for consistent behavior
# Environment variables take precedence over these values
api_keys:
  # Blockchain Explorers (for fetching on-chain data)
  etherscan: ${ETHERSCAN_API_KEY}     # For Ethereum mainnet
  bscscan: ${BSCSCAN_API_KEY}         # For Binance Smart Chain
  polygonscan: ${POLYGONSCAN_API_KEY}  # For Polygon
  snowtrace: ${SNOWTRACE_API_KEY}     # For Avalanche C-Chain
  arbiscan: ${ARBISCAN_API_KEY}       # For Arbitrum
  ftmscan: ${FTMSCAN_API_KEY}        # For Fantom
  cronoscan: ${CRONOSCAN_API_KEY}    # For Cronos
  
  # Node Providers (if using managed nodes)
  # infura: ${INFURA_PROJECT_ID}
  # alchemy: ${ALCHEMY_API_KEY}
  # quicknode: ${QUICKNODE_API_KEY}
  # tatum: ${TATUM_API_KEY}
  
  # Exchange APIs (for CEX integration if needed)
  # binance:
  #   key: ${BINANCE_API_KEY}
  #   secret: ${BINANCE_API_SECRET}
  #   testnet: true  # Use testnet for paper trading mode
  
  # Other Services
  # moralis: ${MORALIS_API_KEY}  # For advanced analytics
  # thegraph: ${THEGRAPH_API_KEY}  # For subgraph queries

# Trading Mode
mode: "paper"  # or "live"

# Paper Trading Settings (only used when mode is "paper")
paper_trading:
  enabled: true
  require_promotion: true  # require promotion gate to switch to live
  min_trades: 20  # minimum paper trades before considering promotion
  min_success_rate: 0.60  # minimum success rate to consider promotion
  auto_switch: true  # enable automatic switch after simulation period
  simulation_days: 30  # days of paper trading before auto-switch to live

