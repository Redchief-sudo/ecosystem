# Multi-Chain Configuration
# ========================
# Configuration for true multi-network trading support

# Multi-Chain Ingestion Pipeline
multi_chain_ingestion:
  max_queue_size: 1000
  enable_scan_tracking: true
  cleanup_processed_scans: true
  max_processed_scans: 1000

# Network-Specific Strategies
strategies:
  # EVM Strategy Configuration
  evm:
    enabled: true
    min_liquidity_usd: 1000.0
    min_volume_24h: 500.0
    max_position_size: 0.1
    confidence_threshold: 0.6
    gas_limit: 200000
    max_gas_price_gwei: 100
    
  # Solana Strategy Configuration  
  solana:
    enabled: true
    min_liquidity_usd: 500.0
    min_volume_24h: 250.0
    max_position_size: 0.08
    confidence_threshold: 0.65
    min_holders: 10
    max_slippage: 0.10
    
  # Aptos Strategy Configuration
  aptos:
    enabled: false  # Enable when Aptos support is ready
    min_liquidity_usd: 1000.0
    min_volume_24h: 500.0
    max_position_size: 0.05
    confidence_threshold: 0.7
    
  # Sui Strategy Configuration
  sui:
    enabled: false  # Enable when Sui support is ready
    min_liquidity_usd: 1000.0
    min_volume_24h: 500.0
    max_position_size: 0.05
    confidence_threshold: 0.7

# Network-Specific Executors
executors:
  # EVM Executor Configuration
  evm:
    enabled: true
    testnet: false
    rpc_url: "${ETHEREUM_RPC_URL}"
    private_key: "${ETHEREUM_PRIVATE_KEY}"
    wallet_address: "${ETHEREUM_WALLET_ADDRESS}"
    max_slippage: 0.05  # 5%
    max_gas_price_gwei: 100
    max_wait_time_seconds: 60
    
  # Solana Executor Configuration
  solana:
    enabled: true
    testnet: false
    rpc_url: "https://api.mainnet-beta.solana.com"
    private_key: "${SOLANA_PRIVATE_KEY}"
    wallet_address: "${SOLANA_WALLET_ADDRESS}"
    max_slippage: 0.10  # 10%
    max_wait_time_seconds: 45
    
  # Aptos Executor Configuration
  aptos:
    enabled: false
    testnet: false
    rpc_url: "https://fullnode.mainnet.aptoslabs.com"
    private_key: "${APTOS_PRIVATE_KEY}"
    wallet_address: "${APTOS_WALLET_ADDRESS}"
    max_wait_time_seconds: 60
    
  # Sui Executor Configuration
  sui:
    enabled: false
    testnet: false
    rpc_url: "https://fullnode.mainnet.sui.io"
    private_key: "${SUI_PRIVATE_KEY}"
    wallet_address: "${SUI_WALLET_ADDRESS}"
    max_wait_time_seconds: 60

# Chain Type Mappings (for auto-detection)
chain_mappings:
  # EVM Chains
  ethereum: evm
  bsc: evm
  polygon: evm
  arbitrum: evm
  optimism: evm
  base: evm
  blast: evm
  avalanche: evm
  fantom: evm
  
  # Non-EVM Chains
  solana: solana
  aptos-mainnet: aptos
  aptos-testnet: aptos
  sui-mainnet: sui
  sui-testnet: sui
  cosmos-hub: cosmos
  osmosis: cosmos
  bitcoin: bitcoin

# Scanner Configuration for Multi-Chain
scanner:
  multi_chain_enabled: true
  chain_detection: true
  address_validation: true
  
  # Per-chain scanner settings
  chains:
    # EVM Chains
    ethereum:
      enabled: true
      scanners: ["dexscreener", "mempool"]
      min_liquidity: 1000.0
      
    bsc:
      enabled: true
      scanners: ["dexscreener", "mempool"]
      min_liquidity: 500.0
      
    solana:
      enabled: true
      scanners: ["dexscreener"]
      min_liquidity: 250.0
      address_type: "solana"
      
    aptos-mainnet:
      enabled: false
      scanners: []
      min_liquidity: 1000.0
      address_type: "aptos"

# Risk Management per Network
risk_management:
  # Global limits
  max_total_exposure: 0.5
  max_daily_trades: 50
  
  # Per-network limits
  network_limits:
    evm:
      max_exposure: 0.3
      max_concurrent_trades: 3
      max_position_size: 0.1
      
    solana:
      max_exposure: 0.15
      max_concurrent_trades: 2
      max_position_size: 0.08
      
    aptos:
      max_exposure: 0.05
      max_concurrent_trades: 1
      max_position_size: 0.05
      
    sui:
      max_exposure: 0.05
      max_concurrent_trades: 1
      max_position_size: 0.05

# Monitoring and Metrics
monitoring:
  multi_chain_metrics: true
  per_network_stats: true
  queue_monitoring: true
  execution_tracking: true
  
  # Alert thresholds
  alerts:
    queue_full_threshold: 0.9
    execution_failure_rate: 0.1
    gas_price_spike_threshold: 100  # gwei for EVM
