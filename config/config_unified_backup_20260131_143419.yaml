# Trading Configuration
trading:
  # General settings
  min_profit_threshold: 0.01  # 1% minimum profit
  max_slippage: 0.005  # 0.5%
  max_gas_price_gwei: 50  # Maximum gas price in Gwei
  
  # Risk management
  max_position_size_eth: 5  # Max position size in ETH
  max_risk_per_trade: 0.02  # 2% of portfolio
  max_open_trades: 5  # Maximum number of concurrent trades
  
  # Flash loan settings
  flash_loan_fee: 0.0009  # 0.09% fee for flash loans
  max_flash_loan_utilization: 0.8  # 80% of available liquidity

# Strategy Configuration
strategies:
  elite_momentum:
    enabled: true
    min_profit_eth: 0.05
    max_gas_price_gwei: 100
    max_position_size_eth: 10
    risk_level: "high"
    
  mean_reversion:
    enabled: true
    min_profit_eth: 0.03
    max_gas_price_gwei: 80
    max_position_size_eth: 8
    risk_level: "medium"
    
  elite_breakout:
    enabled: true
    min_profit_eth: 0.04
    max_gas_price_gwei: 90
    max_position_size_eth: 12
    risk_level: "high"
    
  volatility_breakout:
    enabled: true
    min_profit_eth: 0.06
    max_gas_price_gwei: 120
    max_position_size_eth: 15
    risk_level: "very_high"
    
  elite_aggressive:
    enabled: false  # Disabled by default due to high risk
    min_profit_eth: 0.08
    max_gas_price_gwei: 150
    max_position_size_eth: 20
    risk_level: "very_high"
    
  risk_caps:
    enabled: true
    min_profit_eth: 0.02
    max_gas_price_gwei: 60
    max_position_size_eth: 5
    risk_level: "low"
    
  professional_elite:
    enabled: true
    min_profit_eth: 0.03
    max_gas_price_gwei: 70
    max_position_size_eth: 7
    risk_level: "medium"
    
  smart_money_ultra:
    enabled: true
    min_profit_eth: 0.07
    max_gas_price_gwei: 110
    max_position_size_eth: 18
    risk_level: "high"

# Scanner Configuration
scanners:
  # Global scanner settings
  enabled: true
  max_workers: 8  # Number of concurrent scanner processes
  scan_interval: 60  # Seconds between scans
  max_tokens_per_scan: 100  # Maximum tokens to analyze per scan
  deduplication_window: 300  # Seconds to track duplicate opportunities
  
  # Health and reliability settings
  health_check_interval: 300  # Seconds between health checks
  max_failures: 3  # Maximum failures before circuit breaker
  circuit_breaker_timeout: 600  # Seconds to wait before retry after circuit breaker
  
  # Performance and rate limiting
  rate_limit_delay: 0.5  # Seconds delay between requests
  rate_limit_window: 60  # Time window for rate limiting
  max_requests_per_window: 80  # Max requests per time window
  
  # Timeout settings
  api_timeout: 30  # Seconds for API calls
  connect_timeout: 10  # Seconds for connection timeout
  per_chain_timeout_s: 60.0  # Timeout per chain scan
  per_scanner_timeout_s: 30.0  # Timeout per scanner
  
  # Individual scanner configurations
  dex_screener:
    enabled: true
    name: "DEXScreener Scanner"
    description: "Scans DEXScreener for trending tokens and price movements"
    class: "scanners.discovery.dex_screener_scanner_wrapper.DexScreenerScannerWrapper"
    api_url: "https://api.dexscreener.com/token-profiles/latest/dex"
    timeout: 30
    rate_limit: 10  # requests per second
    min_volume_24h: 10000  # Minimum 24h volume in USD (lowered from 50k)
    min_liquidity: 5000    # Minimum liquidity in USD (lowered from 10k)
    max_age_hours: 48      # Maximum age of data to consider (increased from 24)
    supported_chains: ["ethereum", "bsc", "polygon", "arbitrum", "optimism", "avalanche", "base"]
    max_tokens_per_scan: 20
    debug: false
    
  mempool_scanner:
    enabled: true
    name: "Mempool Scanner"
    description: "Scans transaction mempool for large trades and arbitrage opportunities"
    class: "scanners.discovery.mempool_scanner.MempoolScannerUltra"
    timeout: 15
    max_pending_transactions: 1000
    min_transaction_value_eth: 10  # Minimum ETH value to track
    supported_chains: ["ethereum", "bsc", "polygon", "arbitrum", "optimism", "base", "avalanche", "fantom"]
    gas_price_threshold_gwei: 50  # Only scan transactions above this gas price
    
    # ✅ LOWERED THRESHOLDS for better token discovery
    min_whale_value: 10000         # USD (lowered from 100k)
    min_mev_profit: 50             # USD (lowered from 500)
    min_arb_profit: 25             # USD (lowered from 250)
    max_slippage: 0.01              # 1%
    
  onchain_scanner_ultra:
    enabled: true
    name: "On-Chain Scanner"
    description: "Scans on-chain data for price discrepancies and arbitrage opportunities"
    class: "scanners.discovery.onchain_scanner.OnChainScannerUltra"
    timeout: 45
    scan_depth_blocks: 100  # Number of blocks to scan back
    min_price_difference_pct: 1.0  # Minimum price difference percentage
    supported_chains: ["ethereum", "bsc", "polygon", "arbitrum", "optimism", "avalanche", "fantom"]
    dex_contracts:
      uniswap_v2: "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"
      uniswap_v3: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
      sushiswap: "0xC0AEe478e3658e2610c5F7A4A2E1777cE9e4f2Ac"
      
  sentiment_scanner:
    enabled: true
    name: "Sentiment Scanner"
    description: "Analyzes market sentiment from social media and news sources"
    class: "scanners.discovery.sentiment_scanner.SentimentScanner"
    timeout: 60
    update_interval: 300  # Update sentiment every 5 minutes
    sources: ["twitter", "reddit", "telegram", "discord"]
    min_sentiment_score: 0.7  # Minimum positive sentiment score
    max_age_minutes: 60  # Maximum age of sentiment data
    
    # REQUIRED KEYS
    max_concurrent: 10
    log_level: "INFO"
    
  token_analyzer:
    enabled: true
    name: "Token Analyzer"
    description: "Analyzes token fundamentals and technical indicators"
    class: "scanners.discovery.token_analyzer_scanner.TokenAnalyzerScanner"
    timeout: 30
    min_market_cap: 100000  # Minimum market cap in USD (lowered from 1M)
    min_holders: 100  # Minimum number of token holders
    max_supply_inflation: 0.05  # Maximum annual supply inflation rate
    max_tokens_per_scan: 10
    supported_chains: ["ethereum", "bsc", "polygon", "arbitrum", "optimism", "avalanche", "fantom", "base", "zksync_era", "scroll"]
    weight_onchain: 0.4
    weight_coingecko: 0.6
    cache_enabled: true
    cache_ttl_high_quality: 600
    cache_ttl_low_quality: 60
    max_concurrent: 5
    
  # Chain-specific scanner settings
  chain_settings:
    ethereum:
      enabled: true
      priority: 1  # Highest priority
      scan_interval: 30  # Faster scan for mainnet
      max_gas_price_gwei: 100
      
    bsc:
      enabled: true
      priority: 2
      scan_interval: 45
      max_gas_price_gwei: 20
      
    polygon:
      enabled: true
      priority: 3
      scan_interval: 60
      max_gas_price_gwei: 100
      
    arbitrum:
      enabled: true
      priority: 4
      scan_interval: 60
      max_gas_price_gwei: 5
      
    optimism:
      enabled: true
      priority: 5
      scan_interval: 60
      max_gas_price_gwei: 10
      
    avalanche:
      enabled: true
      priority: 6
      scan_interval: 90
      max_gas_price_gwei: 50
      
    fantom:
      enabled: true
      priority: 7
      scan_interval: 90
      max_gas_price_gwei: 100
      
    base:
      enabled: true
      priority: 8
      scan_interval: 60
      max_gas_price_gwei: 10

# Monitoring & Alerts
alerts:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}  # Set in .env
    chat_id: ${TELEGRAM_CHAT_ID}  # Set in .env
  
  # Health checks
  health_check_interval: 300  # 5 minutes
  max_retry_attempts: 3
  
# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file: "logs/trading_bot.log"
  max_size_mb: 100
  backup_count: 3

# Performance Settings
performance:
  max_workers: 4  # Number of worker threads
  request_timeout: 30  # Seconds
  cache_ttl: 300  # 5 minutes

# Development Settings
dev:
  test_mode: false  # Set to true to disable actual trades
  log_all_transactions: true
  log_all_errors: true
