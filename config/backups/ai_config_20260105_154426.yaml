version: "1.0"
environment: "development"

# AI Configuration
ai:
  # General AI settings
  enabled: true
  model_dir: "models"
  min_confidence: 0.5
  
  # Models configuration
  models:
    # Entry Model (Elite Ensemble)
    entry_model:
      path: "models/entry_ensemble.joblib"
      input_features:
        - "liquidity_score"
        - "volume_momentum"
        - "volatility_index"
        - "rsi"
        - "market_cap_tier"
        - "macd_signal"
        - "bollinger_position"
        - "volume_profile_strength"
        - "order_book_imbalance"
        - "social_momentum"
        - "holder_concentration"
        - "whale_activity"
        - "time_of_day_factor"
        - "market_regime"
        - "rugpull_risk_score"
        - "smart_money_flow"
      output_features:
        - "entry_signal"
        - "confidence"
        - "signal_strength"
      threshold: 0.65
      
    # Exit Model
    exit_model:
      path: "models/exit_ai_model.pkl"
      input_features:
        - "profit_pct"
        - "rsi"
        - "volume_change"
      output_features:
        - "exit_signal"
      threshold: 0.65
        
    # Models (Placeholder for future models)
    risk_assessment_model:
      path: "models/risk_model.pkl"
      input_features:
        - "drawdown"
        - "volatility"
      output_features:
        - "risk_level"
        
    # --- END Models ---
        
  # Prediction logging and versioning
  logging:
    predictions_enabled: true
    log_dir: "logs/predictions"
    
  # Model versioning
  versioning:
    enabled: true
    model_registry: "models/registry"
    keep_versions: 5
    
  # Component-specific settings
  position_ai:
    model_path: "models/position_ai_model.pkl"
    max_position_size: 0.1  # 10% of portfolio
    min_position_size: 0.01  # 1% of portfolio
    
  # Risk Brain settings
  risk_brain:
    max_drawdown: 0.1  # 10% max drawdown
    max_position_risk: 0.2  # 20% max risk per position
    max_portfolio_risk: 0.3  # 30% max risk for entire portfolio
    
  # Score Engine settings
  score_engine:
    weights:
      liquidity: 0.25
      volatility: 0.2
      volume: 0.2
      momentum: 0.15
      sentiment: 0.1
      market_cap: 0.1
    min_liquidity: 100000  # $100k minimum liquidity
    
  # Model training settings
  training:
    batch_size: 32
    epochs: 50
    learning_rate: 0.001
    validation_split: 0.2
    early_stopping_patience: 5
    
  # Elite Entry AI Settings
  entry:
    model_path: 'models/entry_ensemble.joblib'
    metrics_path: 'models/entry_metrics.joblib'
    confidence_threshold: 0.65
    min_liquidity: 100000
    min_volume: 5000
    min_ai_score: 0.55
    
  # Retraining settings
  retraining:
    enabled: true
    interval_hours: 24  # Retrain every 24 hours
    min_samples: 10000 # Minimum data points required for retraining
